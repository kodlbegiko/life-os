<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Nunito+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script defer src="/assets/app.js"></script>
  </head>
  <body>
    <div class="desktop-frame" aria-label="Life OS public demo">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="traffic-lights" aria-hidden="true">
          <span class="traffic-dot red"></span>
          <span class="traffic-dot yellow"></span>
          <span class="traffic-dot green"></span>
        </div>

        <div class="sidebar-title">
          <button class="sidebar-toggle" type="button" aria-label="Toggle sidebar">▥</button>
          <strong>Life OS</strong>
        </div>

        <nav id="sidebarNav" class="nav-list"></nav>
      </aside>

      <section class="app-surface">
        <header class="topbar">
          <div class="toolbar-cluster" aria-label="Quick actions">
            <button class="round-tool" type="button" data-disabled-action="ledger">+</button>
            <button class="round-tool" type="button" data-disabled-action="calendar">▦+</button>
            <button class="round-tool" type="button" data-disabled-action="task">☑</button>
            <button class="round-tool" type="button" data-disabled-action="planned">▦+</button>
            <span class="toolbar-divider"></span>
            <button id="inspectorToggle" class="round-tool" type="button" data-panel-toggle aria-label="Toggle inspector panel" aria-expanded="false">▥</button>
          </div>

          <label class="search-shell">
            <span aria-hidden="true">⌕</span>
            <input id="workspaceSearch" type="search" placeholder="搜尋目前工作區" autocomplete="off" />
          </label>
        </header>

        <main class="main-scroll">
          <div id="demoBanner" class="demo-banner" hidden>
            <strong>Public Demo / Read-only</strong>
            <span>這是公開展示版。新增、刪除、同步與匯入都已停用。</span>
          </div>
          <section id="workspace" class="workspace" aria-live="polite"></section>
        </main>
      </section>

      <aside id="inspector" class="inspector" aria-label="Inspector panel"></aside>
    </div>
  </body>
</html>
